name: Build APK

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - index.html
      - sw.js
      - 'android/**'
      - .github/workflows/build-apk.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build signed release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease -Pvc=${{ github.run_number }} --no-daemon

      - name: Collect APK
        run: cp android/app/build/outputs/apk/release/app-release.apk StoryMind.apk

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: StoryMind-apk
          path: StoryMind.apk

      - name: Publish to "apk" release (stable download link)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create apk --title "StoryMind APK" \
            --notes "Latest StoryMind Android build" 2>/dev/null || true
          gh release upload apk StoryMind.apk --clobber
          gh release edit apk --notes "Built from commit ${GITHUB_SHA::7} on $(date -u '+%Y-%m-%d %H:%M UTC') (build #${{ github.run_number }})"
